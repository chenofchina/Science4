                                    <button class="icon-btn${visClass}" data-action="toggle" data-id="${fnObj.id}" title="${fnObj.visible?'隐藏':'显示'}">${fnObj.visible?'👁':'👁‍🗨'}</button>
                                    <button class="icon-btn" data-action="edit" data-id="${fnObj.id}" title="编辑">✎</button>
                                    <button class="btn-danger-sm" data-action="delete" data-id="${fnObj.id}" title="删除">✕</button>
                                </span>
                            </li>
                        `;
                    }
                    fnListEl.innerHTML = html;

                    // 绑定事件
                    fnListEl.querySelectorAll('[data-action="color"]').forEach(el => {
                        el.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const id = el.dataset.id;
                            const fnObj = STATE.functions.find(f => f.id === id);
                            if (!fnObj) return;
                            hiddenColorPicker.value = fnObj.color;
                            hiddenColorPicker._targetId = id;
                            hiddenColorPicker.click();
                        });
                    });
                    fnListEl.querySelectorAll('[data-action="toggle"]').forEach(el => {
                        el.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const id = el.dataset.id;
                            const fnObj = STATE.functions.find(f => f.id === id);
                            if (fnObj) {
                                fnObj.visible = !fnObj.visible;
                                updateFnList();
                                draw();
                            }
                        });
                    });
                    fnListEl.querySelectorAll('[data-action="edit"]').forEach(el => {
                        el.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const id = el.dataset.id;
                            editFunction(id);
                        });
                    });
                    fnListEl.querySelectorAll('[data-action="delete"]').forEach(el => {
                        el.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const id = el.dataset.id;
                            deleteFunction(id);
                        });
                    });
                    // 点击列表项选中
                    fnListEl.querySelectorAll('.fn-list-item').forEach(li => {
                        li.addEventListener('click', () => {
                            const id = li.dataset.id;
                            if (STATE.selectedFnId === id) {
                                // 取消选中
                                STATE.selectedFnId = null;
                            } else {
                                STATE.selectedFnId = id;
                            }
                            updateFnList();
                            updateAddButton();
                            if (STATE.selectedFnId) {
                                const fnObj = STATE.functions.find(f => f.id === STATE
                                    .selectedFnId);
                                if (fnObj) {
                                    STATE.currentType = fnObj.type;
                                    STATE.currentParams = { ...fnObj.params };
                                    updateTabs();
                                    updateParamInputs();
                                    updateQuickFormulas();
                                }
                            }
                        });
                    });
                }
                updateAddButton();
            }

            function addFunction() {
                const funcType = FUNC_TYPES[STATE.currentType];
                const params = { ...STATE.currentParams };
                // 确保所有必需参数存在
                for (const pName of funcType.params) {
                    if (params[pName] === undefined) params[pName] = funcType.defaultParams[pName];
                }
                const expr = funcType.toExpr(params);
                const colorIdx = STATE.functions.length % COLOR_PALETTE.length;
                const fnObj = {
                    id: generateId(),
                    type: STATE.currentType,
                    params: params,
                    color: COLOR_PALETTE[colorIdx],
                    visible: true,
                    expr: expr,
                };
                STATE.functions.push(fnObj);
                STATE.selectedFnId = null;
                updateFnList();
                updateAddButton();
                draw();
                saveHistory();
                showToast('已添加：' + expr);
            }

            function updateSelectedFunction() {
                if (!STATE.selectedFnId) return;
                const fnObj = STATE.functions.find(f => f.id === STATE.selectedFnId);
                if (!fnObj) return;
                if (fnObj.type !== STATE.currentType) {
                    // 类型变了，需要更新类型和参数
                    fnObj.type = STATE.currentType;
                }
                fnObj.params = { ...STATE.currentParams };
                fnObj.expr = FUNC_TYPES[fnObj.type].toExpr(fnObj.params);
                updateFnList();
                draw();
                saveHistory();
                showToast('已更新：' + fnObj.expr);
            }

            function editFunction(id) {
                const fnObj = STATE.functions.find(f => f.id === id);
                if (!fnObj) return;
                STATE.selectedFnId = id;
                STATE.currentType = fnObj.type;
                STATE.currentParams = { ...fnObj.params };
                updateTabs();
                updateParamInputs();
                updateQuickFormulas();
                updateFnList();
                updateAddButton();
                showToast('正在编辑：' + fnObj.expr);
            }

            function deleteFunction(id) {
                STATE.functions = STATE.functions.filter(f => f.id !== id);
                if (STATE.selectedFnId === id) STATE.selectedFnId = null;
                updateFnList();
                updateAddButton();
                draw();
                saveHistory();
                showToast('已删除函数');
            }

            function clearAllFunctions() {
                if (STATE.functions.length === 0) return;
                if (confirm('确定要清空所有函数吗？此操作不可恢复。')) {
                    STATE.functions = [];
                    STATE.selectedFnId = null;
                    updateFnList();
                    updateAddButton();
                    draw();
                    saveHistory();
                    showToast('已清空全部函数');
                }
            }

            // ============================
            //  历史记录（localStorage）
            // ============================
            function saveHistory() {
                try {
                    const data = STATE.functions.map(f => ({
                        type: f.type,
                        params: f.params,
                        color: f.color,
                        visible: f.visible,
                    }));
                    localStorage.setItem('funcPlotter_history', JSON.stringify(data));
                } catch (e) {
                    // localStorage不可用
                }
            }

            function loadHistory() {
                try {
                    const raw = localStorage.getItem('funcPlotter_history');
                    if (!raw) {
                        showToast('没有保存的历史记录');
                        return;
                    }
                    const data = JSON.parse(raw);
                    if (!Array.isArray(data) || data.length === 0) {
                        showToast('历史记录为空');
                        return;
                    }
                    STATE.functions = data.map(item => ({
                        id: generateId(),
                        type: item.type,
                        params: item.params,
                        color: item.color,
                        visible: item.visible !== false,
                        expr: FUNC_TYPES[item.type] ? FUNC_TYPES[item.type].toExpr(item.params) : '未知',
                    }));
                    STATE.selectedFnId = null;
                    updateFnList();
                    updateAddButton();
                    draw();
                    showToast(`已加载 ${STATE.functions.length} 个函数`);
                } catch (e) {
                    showToast('加载历史记录失败');
                }
            }

            // ============================
            //  颜色更改
            // ============================
            hiddenColorPicker.addEventListener('input', () => {
                const id = hiddenColorPicker._targetId;
                if (!id) return;
                const fnObj = STATE.functions.find(f => f.id === id);
                if (fnObj) {
                    fnObj.color = hiddenColorPicker.value;
                    updateFnList();
                    draw();
                    saveHistory();
                }
            });
            hiddenColorPicker.addEventListener('change', () => {
                const id = hiddenColorPicker._targetId;
                if (!id) return;
                const fnObj = STATE.functions.find(f => f.id === id);
                if (fnObj) {
                    fnObj.color = hiddenColorPicker.value;
                    updateFnList();
                    draw();
                    saveHistory();
                }
                hiddenColorPicker._targetId = null;
            });

            // ============================
            //  按钮事件绑定
            // ============================
            btnAdd.addEventListener('click', () => {
                if (STATE.selectedFnId) {
                    updateSelectedFunction();
                } else {
                    addFunction();
                }
            });
            btnUpdate.addEventListener('click', () => {
                if (STATE.selectedFnId) {
                    updateSelectedFunction();
                } else {
                    // 没有选中时，直接添加
                    addFunction();
                }
            });
            btnClearAll.addEventListener('click', clearAllFunctions);
            btnLoadHistory.addEventListener('click', loadHistory);

            tabRow.addEventListener('click', (e) => {
                const btn = e.target.closest('.tab-btn');
                if (!btn) return;
                const type = btn.dataset.type;
                if (type && type !== STATE.currentType) {
                    switchType(type);
                }
            });

            // ============================
            //  窗口大小变化
            // ============================
            window.addEventListener('resize', () => {
                resizeCanvas();
                draw();
            });

            // ============================
            //  初始化
            // ============================
            function init() {
                resizeCanvas();
                switchType('linear');
                updateFnList();
                updateAddButton();
                // 尝试加载历史
                tryLoadHistoryOnStart();
                draw();
            }

            function tryLoadHistoryOnStart() {
                try {
                    const raw = localStorage.getItem('funcPlotter_history');
                    if (raw) {
                        const data = JSON.parse(raw);
                        if (Array.isArray(data) && data.length > 0) {
                            STATE.functions = data.map(item => ({
                                id: generateId(),
                                type: item.type,
                                params: item.params,
                                color: item.color,
                                visible: item.visible !== false,
                                expr: FUNC_TYPES[item.type] ? FUNC_TYPES[item.type].toExpr(item
                                    .params) : '未知',
                            }));
                            updateFnList();
                            updateAddButton();
                            draw();
                            return;
                        }
                    }
                } catch (e) { /* 忽略 */ }
                // 默认添加一个示例函数
                STATE.currentType = 'quadratic';
                STATE.currentParams = { a: 1, b: -4, c: 3 };
                updateTabs();
                updateParamInputs();
                updateQuickFormulas();
                const fnObj = {
                    id: generateId(),
                    type: 'quadratic',
                    params: { a: 1, b: -4, c: 3 },
                    color: COLOR_PALETTE[0],
                    visible: true,
                    expr: 'y = x² - 4x + 3',
                };
                STATE.functions.push(fnObj);
                updateFnList();
                updateAddButton();
                draw();
            }

            init();
            console.log('📐 平面直角坐标系函数绘图工具已就绪');
            console.log('   - 滚轮缩放 | 拖拽平移 | 双击重置');
            console.log('   - Ctrl+S 保存PNG | R键重置视图');
            console.log('   - 1/2/3/4 切换函数类型');
        })();
    </script>
</body>
</html>
