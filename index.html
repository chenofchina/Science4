<!--
============================================
  理科 & 计算机工具中心 - index.html
  ============================================
  文件命名规范：
  - 主页文件：index.html（本文件）
  - 数学工具：math.html （主要功能：直角平面坐标系画图）
  - 化学工具：hx.html   （主要功能：元素周期表和化学方程式配平）
  - 物理工具：pyt.html  （主要功能：抛物线运动推导）
  - 生物工具：sw.html   （主要功能：遗传学模拟）

  使用说明：
  1. 本文件是工具中心主页，导航栏提供“理科工具”与“计算机工具”两大板块。
  2. 理科工具：展示数学、物理、化学、生物四个学科卡片。
     - 点击卡片主体，会弹出模态窗口，使用iframe直接预览工具。
     - 点击卡片右上角的“🔗”按钮，会在新标签页打开对应工具。
  3. 计算机工具：集成API接口测试器和密码强度检测与生成器，通过Tab切换使用。
  4. 请确保 math.html、hx.html、pyt.html、sw.html 与本文件位于同一目录。
  5. 每日科技名言已扩充至120条，支持浅色/深色模式（默认深色），响应式适配移动端。
  6. 所有功能均在本地浏览器运行，不会发送数据到服务器（API测试器由您自行输入地址）。

  版本：v2.1.0
  日期：2026-05-30
============================================
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理科 & 计算机工具中心</title>
    <style>
        :root {
            /* 深色模式（默认） */
            --bg-body: #1a1d23;
            --bg-header: #1e2128;
            --bg-card: #252830;
            --bg-card-hover: #2a2e37;
            --bg-input: #1a1d23;
            --bg-tab: #2a2e37;
            --bg-tab-active: #1e2128;
            --bg-code: #1a1d20;
            --bg-badge: #2a2e37;
            --bg-scrollbar-track: #1e2128;
            --bg-scrollbar-thumb: #3a3f4b;
            --bg-modal-overlay: rgba(0,0,0,0.75);
            --bg-modal-content: #1e2128;
            --text-primary: #ECF0F1;
            --text-secondary: #b0b8c4;
            --text-muted: #6b7280;
            --text-code: #e1e4e8;
            --border: #353a44;
            --border-light: #2d323a;
            --accent-blue: #3498DB;
            --accent-green: #27AE60;
            --accent-red: #e74c3c;
            --accent-yellow: #f1c40f;
            --color-primary: #2C3E50;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow: 0 2px 8px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
            --progress-bg: #353a44;
            --toast-bg: #27AE60;
            --toast-text: #fff;
            --divider: #2d323a;
        }
        [data-theme="light"] {
            --bg-body: #f5f6f8;
            --bg-header: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #f0f3f6;
            --bg-input: #ffffff;
            --bg-tab: #eef1f5;
            --bg-tab-active: #ffffff;
            --bg-code: #f1f3f5;
            --bg-badge: #eef1f5;
            --bg-scrollbar-track: #f0f2f5;
            --bg-scrollbar-thumb: #c5cdd5;
            --bg-modal-overlay: rgba(0,0,0,0.5);
            --bg-modal-content: #ffffff;
            --text-primary: #1a1d23;
            --text-secondary: #4a5568;
            --text-muted: #8a9aa8;
            --text-code: #2d3748;
            --border: #dde2e8;
            --border-light: #e8ecf1;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
            --progress-bg: #e8ecf1;
            --toast-bg: #27AE60;
            --toast-text: #fff;
            --divider: #e8ecf1;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.35s, color 0.35s;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-scrollbar-track); }
        ::-webkit-scrollbar-thumb { background: var(--bg-scrollbar-thumb); border-radius: 3px; }
        .app-container { max-width: 1200px; margin: 0 auto; padding: 0 16px 24px; }

        /* Header */
        .app-header {
            background: var(--bg-header);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 12px;
            margin-bottom: 16px; border-radius: 0 0 12px 12px; box-shadow: var(--shadow-sm);
        }
        .header-brand { display: flex; align-items: center; gap: 10px; }
        .header-logo {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, #3498DB, #27AE60);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; color: #fff;
        }
        .header-title { font-size: 1.2rem; font-weight: 700; color: var(--text-primary); letter-spacing: 0.02em; }
        .header-subtitle { font-size: 0.72rem; color: var(--text-muted); display: block; }
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .btn-icon {
            width: 38px; height: 38px; border-radius: 50%;
            border: 2px solid var(--border); background: var(--bg-card);
            cursor: pointer; font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-primary); transition: all 0.2s; position: relative;
        }
        .btn-icon:hover { border-color: var(--accent-blue); box-shadow: var(--shadow); }
        .btn-icon .icon-inner { position: absolute; transition: opacity 0.3s, transform 0.3s; }
        [data-theme="light"] .btn-icon .icon-dark { opacity:0; transform:scale(0.5) rotate(-90deg); }
        [data-theme="light"] .btn-icon .icon-light { opacity:1; transform:scale(1) rotate(0); }
        .btn-icon .icon-dark { opacity:1; transform:scale(1) rotate(0); }
        .btn-icon .icon-light { opacity:0; transform:scale(0.5) rotate(90deg); }

        /* Navigation */
        .nav-bar {
            display: flex; gap: 8px; margin-bottom: 16px;
            padding: 4px; background: var(--bg-header); border-radius: 12px; box-shadow: var(--shadow-sm);
        }
        .nav-btn {
            flex: 1; padding: 12px 20px; border-radius: 8px;
            border: none; background: transparent;
            color: var(--text-secondary); cursor: pointer;
            font-size: 0.95rem; font-weight: 600;
            transition: all 0.2s; letter-spacing: 0.02em; text-align: center; font-family: inherit;
        }
        .nav-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .nav-btn.active { background: var(--accent-blue); color: #fff; box-shadow: 0 2px 8px rgba(52,152,219,0.3); }

        /* 欢迎区 */
        .welcome-section {
            margin-bottom: 18px; padding: 16px 20px;
            background: var(--bg-card); border-radius: 12px;
            border: 1px solid var(--border-light); box-shadow: var(--shadow);
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 10px;
        }
        .quote-text { font-style: italic; font-size: 1rem; color: var(--text-secondary); flex:1; }
        .btn-refresh-quote {
            width: 32px; height: 32px; border-radius: 50%;
            border:1px solid var(--border); background: var(--bg-input);
            cursor: pointer; font-size:0.9rem;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); transition: all 0.2s;
        }
        .btn-refresh-quote:hover { border-color: var(--accent-blue); color: var(--accent-blue); transform: rotate(60deg); }

        /* 内容区域 */
        .content-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
        .subject-cards-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
        }
        @media (max-width: 700px) { .subject-cards-grid { grid-template-columns: repeat(2,1fr); } }
        @media (max-width: 450px) { .subject-cards-grid { grid-template-columns: 1fr; } }
        .subject-card {
            background: var(--bg-card); border-radius: 12px;
            padding: 20px 16px; cursor: pointer;
            border: 2px solid transparent; transition: all 0.25s;
            box-shadow: var(--shadow-sm);
            display: flex; flex-direction: column; align-items: center;
            gap: 8px; color: var(--text-primary); text-decoration: none;
            text-align: center; position: relative;
        }
        .subject-card:hover {
            border-color: var(--accent-blue); box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }
        .subject-card .card-icon { font-size: 2.5rem; }
        .subject-card h4 { font-size: 1rem; font-weight: 700; }
        .subject-card p { font-size: 0.75rem; color: var(--text-muted); }
        .subject-card .btn-new-tab {
            position: absolute; top: 8px; right: 8px;
            width: 28px; height: 28px; border-radius: 6px;
            border: 1px solid var(--border); background: var(--bg-input);
            color: var(--text-secondary); cursor: pointer;
            font-size: 0.8rem; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; opacity: 0;
        }
        .subject-card:hover .btn-new-tab { opacity: 1; }
        .subject-card .btn-new-tab:hover { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }

        /* 计算机区域 */
        .computer-area {
            background: var(--bg-card); border-radius: 12px;
            border: 1px solid var(--border); box-shadow: var(--shadow);
            overflow: hidden; display: flex; flex-direction: column;
        }
        .tab-header { display: flex; border-bottom: 1px solid var(--border); background: var(--bg-tab); }
        .tab-btn {
            flex:1; padding: 12px 16px; text-align: center;
            background: transparent; border: none; cursor: pointer;
            font-weight: 600; font-size: 0.85rem;
            color: var(--text-secondary); transition: all 0.2s;
            border-bottom: 3px solid transparent; font-family: inherit;
        }
        .tab-btn.active { color: var(--accent-blue); background: var(--bg-tab-active); border-bottom-color: var(--accent-blue); }
        .tab-content { display: none; padding: 16px; overflow-y: auto; max-height: 70vh; flex:1; }
        .tab-content.active { display: block; }

        /* API 测试器 */
        .api-form { display: flex; flex-direction: column; gap: 12px; }
        .api-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        select, .api-input, textarea {
            background: var(--bg-input); border: 1px solid var(--border);
            color: var(--text-primary); padding: 8px 12px; border-radius: 6px;
            font-family: inherit; font-size: 0.85rem; transition: border-color 0.2s;
        }
        select:focus, .api-input:focus, textarea:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(52,152,219,0.2); }
        textarea { resize: vertical; min-height: 70px; font-family: "SF Mono", "Cascadia Code", "Consolas", monospace; }
        .btn-send {
            padding: 10px 24px; background: var(--accent-blue); color: #fff;
            border: none; border-radius: 6px; font-weight: 600; cursor: pointer;
            font-size: 0.85rem; align-self: flex-start;
        }
        .btn-send:hover { background: #2980b9; }
        .response-box {
            background: var(--bg-code); border: 1px solid var(--border);
            border-radius: 8px; padding: 12px;
            font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
            font-size: 0.8rem; white-space: pre-wrap; word-break: break-all;
            max-height: 300px; overflow-y: auto; color: var(--text-code);
        }

        /* 密码工具 */
        .pw-section { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 600px) { .pw-section { grid-template-columns: 1fr; } }
        .pw-card { background: var(--bg-card-hover); border-radius: 8px; padding: 14px; border: 1px solid var(--border-light); }
        .pw-card h4 { font-size: 0.9rem; margin-bottom: 10px; color: var(--text-primary); }
        .input-password {
            width: 100%; padding: 10px; background: var(--bg-input);
            border: 1px solid var(--border); color: var(--text-primary);
            border-radius: 6px; font-family: "SF Mono", monospace; margin-bottom: 8px;
        }
        .strength-bar { height: 6px; border-radius: 3px; background: var(--progress-bg); margin: 6px 0; overflow: hidden; }
        .strength-fill { height: 100%; width: 0%; transition: width 0.4s, background 0.4s; }
        .pw-generate-options { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
        .pw-generate-options label { font-size: 0.72rem; display: flex; align-items: center; gap: 4px; background: var(--bg-badge); padding: 4px 8px; border-radius: 4px; cursor: pointer; color: var(--text-secondary); }
        .btn-generate { background: var(--accent-green); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.8rem; }
        .generated-list { list-style: none; margin-top: 8px; }
        .generated-list li { display: flex; justify-content: space-between; align-items: center; background: var(--bg-code); padding: 6px 10px; border-radius: 4px; margin-bottom: 4px; font-family: monospace; font-size: 0.78rem; }
        .btn-copy { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 0.65rem; }
        .btn-copy:hover { background: var(--accent-green); color:#fff; border-color:var(--accent-green); }

        /* 模态弹窗 (iframe预览) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-modal-overlay); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden;
            transition: opacity 0.25s, visibility 0.25s;
            padding: 20px;
        }
        .modal-overlay.visible { opacity: 1; visibility: visible; }
        .modal-dialog {
            background: var(--bg-modal-content);
            border-radius: 16px; width: 90vw; max-width: 1100px;
            height: 85vh; display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transform: scale(0.95); transition: transform 0.25s;
        }
        .modal-overlay.visible .modal-dialog { transform: scale(1); }
        .modal-header {
            display: flex; align-items: center; gap: 8px;
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .modal-title { font-weight: 700; font-size: 1rem; flex: 1; color: var(--text-primary); }
        .modal-header .btn-icon {
            width: 34px; height: 34px; border-radius: 50%;
            border: 1px solid var(--border); background: var(--bg-input);
            cursor: pointer; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary); transition: all 0.2s;
        }
        .modal-header .btn-icon:hover { background: var(--accent-red); color: #fff; border-color: var(--accent-red); }
        .modal-body {
            flex: 1; position: relative; overflow: hidden;
        }
        .modal-body iframe {
            width: 100%; height: 100%; border: none;
        }
        .loading-spinner {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            color: var(--text-muted); font-size: 0.9rem;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid var(--border);
            border-top-color: var(--accent-blue); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: var(--toast-bg); color: var(--toast-text);
            padding: 10px 20px; border-radius: 20px; font-size: 0.8rem;
            font-weight: 600; z-index: 2000;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            transition: transform 0.35s cubic-bezier(0.22,0.61,0.36,1);
            pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .app-footer { text-align: center; padding: 16px 0 8px; color: var(--text-muted); font-size: 0.7rem; border-top: 1px solid var(--divider); margin-top: 20px; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-brand">
                <div class="header-logo">🔬</div>
                <div>
                    <span class="header-title">理科 & 计算机工具中心</span>
                    <span class="header-subtitle">Science & Computing Toolkit</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-icon" id="btnThemeToggle" title="切换深浅色模式" aria-label="切换主题">
                    <span class="icon-inner icon-dark">🌙</span>
                    <span class="icon-inner icon-light">☀️</span>
                </button>
            </div>
        </header>

        <!-- 导航栏：理科工具 | 计算机工具 -->
        <nav class="nav-bar" id="mainNav">
            <button class="nav-btn active" data-section="science">🔬 理科工具</button>
            <button class="nav-btn" data-section="computer">💻 计算机工具</button>
        </nav>

        <!-- 每日一言 -->
        <div class="welcome-section">
            <span class="quote-text" id="quoteText">加载中...</span>
            <button class="btn-refresh-quote" id="btnRefreshQuote" title="换一句名言">🔄</button>
        </div>

        <!-- 内容区 -->
        <div class="content-grid" id="contentGrid">
            <!-- 理科工具视图 -->
            <div id="scienceView" class="subject-cards-grid">
                <!-- 动态生成四个学科卡片 -->
            </div>
            <!-- 计算机工具视图 -->
            <div id="computerView" style="display:none;">
                <div class="computer-area">
                    <div class="tab-header">
                        <button class="tab-btn active" data-tab="api">🔌 API 接口测试器</button>
                        <button class="tab-btn" data-tab="password">🔐 密码强度检测与生成器</button>
                    </div>
                    <div class="tab-content active" id="tabApi">
                        <div class="api-form">
                            <div class="api-row">
                                <select id="apiMethod">
                                    <option value="GET">GET</option>
                                    <option value="POST">POST</option>
                                    <option value="PUT">PUT</option>
                                    <option value="DELETE">DELETE</option>
                                </select>
                                <input type="url" class="api-input" id="apiUrl" placeholder="https://api.example.com/data" style="flex:1;" value="https://jsonplaceholder.typicode.com/posts/1">
                            </div>
                            <div>
                                <label style="font-size:0.8rem;color:var(--text-muted);">请求头 (JSON 格式，可选)</label>
                                <textarea id="apiHeaders" rows="2" placeholder='{"Content-Type":"application/json"}'></textarea>
                            </div>
                            <div>
                                <label style="font-size:0.8rem;color:var(--text-muted);">请求体 (用于 POST/PUT)</label>
                                <textarea id="apiBody" rows="3" placeholder='{"key":"value"}'></textarea>
                            </div>
                            <button class="btn-send" id="btnSendApi">🚀 发送请求</button>
                            <div>
                                <label style="font-size:0.8rem;color:var(--text-muted);">响应结果</label>
                                <div class="response-box" id="apiResponse">等待请求...</div>
                            </div>
                            <div style="font-size:0.72rem;color:var(--text-muted);margin-top:4px;">⚠️ 浏览器跨域限制，可使用 <code>https://jsonplaceholder.typicode.com</code> 等开放API测试。</div>
                        </div>
                    </div>
                    <div class="tab-content" id="tabPassword">
                        <div class="pw-section">
                            <div class="pw-card">
                                <h4>🔍 密码强度检测</h4>
                                <input type="text" class="input-password" id="pwInput" placeholder="输入密码..." autocomplete="off">
                                <div class="strength-bar"><div class="strength-fill" id="pwStrengthFill"></div></div>
                                <div style="display:flex;justify-content:space-between;font-size:0.7rem;"><span id="pwStrengthLabel">—</span></div>
                                <div style="font-size:0.7rem;color:var(--text-muted);margin-top:4px;" id="pwSuggestions"></div>
                            </div>
                            <div class="pw-card">
                                <h4>⚡ 密码生成器</h4>
                                <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                                    <span style="font-size:0.8rem;">长度</span>
                                    <input type="range" id="pwLength" min="6" max="64" value="16" style="flex:1;">
                                    <span id="pwLengthValue">16</span>
                                </div>
                                <div class="pw-generate-options">
                                    <label><input type="checkbox" id="pwLower" checked> 小写</label>
                                    <label><input type="checkbox" id="pwUpper" checked> 大写</label>
                                    <label><input type="checkbox" id="pwDigits" checked> 数字</label>
                                    <label><input type="checkbox" id="pwSpecial" checked> 符号</label>
                                </div>
                                <button class="btn-generate" id="btnGeneratePw">生成密码 (8个)</button>
                                <ul class="generated-list" id="generatedPwList"></ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="app-footer">
            v2.1.0 · 所有工具本地运行，无需网络 · 点击卡片预览，🔗新标签页打开
        </footer>
    </div>

    <!-- 模态弹窗（iframe预览） -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-dialog">
            <div class="modal-header">

            document.getElementById('btnSendApi').addEventListener('click', async () => {

                if (!url) { responseEl.textContent = '❌ 请输入URL'; return; }
                responseEl.textContent = '⏳ 请求中...';
                const options = { method };
                if (headersText) {
                    try { options.headers = JSON.parse(headersText); } catch (e) { responseEl.textContent = '❌ 请求头JSON格式错误'; return; }
                }
                if ((method === 'POST' || method === 'PUT') && bodyText) {
                    options.body = bodyText;
                }
                try {
                    const res = await fetch(url, options);
                    const contentType = res.headers.get('content-type') || '';
                    let data;
                    if (contentType.includes('application/json')) {
                        data = await res.json();
                        responseEl.textContent = JSON.stringify(data, null, 2);
                    } else {
                        data = await res.text();
                        responseEl.textContent = data || '(空响应)';
                    }

            // ========== 密码工具 ==========
            const pwInput = document.getElementById('pwInput');

            const generatedPwList = document.getElementById('generatedPwList');

            pwLength.addEventListener('input', () => { pwLengthValue.textContent = pwLength.value; });
            function analyzePassword(pw) {
                let score = 0;
                const checks = {
                    length: pw.length >= 12,
                    digit: /\d/.test(pw),
                    lower: /[a-z]/.test(pw),
                    upper: /[A-Z]/.test(pw),
                    special: /[^a-zA-Z0-9]/.test(pw),
                };
                if (pw.length >= 8) score++;
                if (pw.length >= 12) score++;
                if (checks.digit) score++;
                if (checks.lower) score++;
                if (checks.upper) score++;
                if (checks.special) score++;
                const dictWords = ['password','123456','qwerty','abc123'];
                const hasDict = dictWords.some(w => pw.toLowerCase().includes(w));
                if (hasDict) score = Math.max(0, score-2);
                let level = '极弱', color = '#e74c3c';
                if (score >= 7) { level = '极强'; color = '#27AE60'; }
                else if (score >= 5) { level = '强'; color = '#2ecc71'; }
                else if (score >= 3) { level = '中等'; color = '#f1c40f'; }
                else if (score >= 1) { level = '弱'; color = '#e67e22'; }
                const percent = Math.min(100, Math.round((score/8)*100));
                return { percent, color, level, checks, hasDict };
            }
            pwInput.addEventListener('input', () => {
                const pw = pwInput.value;
                if (!pw) {
                    pwStrengthFill.style.width = '0%';

                const result = analyzePassword(pw);
                pwStrengthFill.style.width = result.percent + '%';
                pwStrengthFill.style.background = result.color;
                pwStrengthLabel.textContent = result.level;
                let sug = [];
                if (!result.checks.length) sug.push('增加长度至12位以上');
                if (!result.checks.digit) sug.push('添加数字');
                if (!result.checks.lower) sug.push('添加小写字母');
                if (!result.checks.upper) sug.push('添加大写字母');
                if (!result.checks.special) sug.push('添加特殊字符');
                if (result.hasDict) sug.push('避免使用常见单词');
                pwSuggestions.innerHTML = sug.map(s => '• ' + s).join('<br>') || '✅ 密码强度优秀';
            });
            function generatePassword(len, lower, upper, digits, special) {
                let charset = '';
                if (lower) charset += 'abcdefghijklmnopqrstuvwxyz';
                if (upper) charset += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                if (digits) charset += '0123456789';
                if (special) charset += '!@#$%^&*()_+-=[]{}|;:,.<>?';
                if (!charset) charset = 'abcdefghijklmnopqrstuvwxyz';
                let pw = '';
                for (let i=0; i<len; i++) pw += charset[Math.floor(Math.random() * charset.length)];
                return pw;
            }
            btnGeneratePw.addEventListener('click', () => {
                const len = parseInt(pwLength.value);
                const lower = document.getElementById('pwLower').checked;
                const upper = document.getElementById('pwUpper').checked;
                const digits = document.getElementById('pwDigits').checked;
                const special = document.getElementById('pwSpecial').checked;
                const pws = [];
                for (let i=0; i<8; i++) pws.push(generatePassword(len, lower, upper, digits, special));
                generatedPwList.innerHTML = pws.map(p => `<li><span>${p}</span><button class="btn-copy" data-copy="${p}">复制</button></li>`).join('');
                document.querySelectorAll('.btn-copy').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const text = this.getAttribute('data-copy');
                        if (navigator.clipboard?.writeText) {
                            navigator.clipboard.writeText(text).then(() => showToast('✅ 已复制'));
                        } else {
                            const ta = document.createElement('textarea');
                            ta.value = text; document.body.appendChild(ta); ta.select();
                            document.execCommand('copy'); document.body.removeChild(ta);
                            showToast('✅ 已复制');
                        }
                    });
                });
            });

            // ========== Toast ==========
            function showToast(msg) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(window.toastTimer);
                window.toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
            }
        })();
    </script>
</body>
</html>
