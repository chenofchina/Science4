<!--
使用说明：
  1. 本工具包含三个标签页：元素周期表、化学方程式配平器、常见反应库
  2. 周期表：点击任意元素查看详细信息，顶部搜索框支持符号或名称搜索
  3. 配平器：输入反应物和生成物（如 Mg + O2 → MgO），选择反应条件，点击"配平"
  4. 反应库：内置20+条常见反应，可搜索并一键载入配平器
  5. 支持添加反应条件（加热、高温、催化剂等）和自定义条件

作者备注：本工具面向化学学习使用，配平算法基于高斯消元矩阵法
数据来源说明：
  - 元素数据参考IUPAC及公开化学数据库
  - 原子量采用标准原子量（放射性元素使用质量数）
  - 电子排布参考标准原子物理数据
  - 反应库来源于高中/大学化学教材常见实验
-->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>化学方程式配平与元素周期表工具箱</title>
    <style>
        :root {
            --bg: #ECF0F1;
            --dark: #2C3E50;
            --blue: #3498DB;
            --blue-dark: #2980B9;
            --white: #FFFFFF;
            --border: #D5DBDB;
            --text: #2C3E50;
            --text-light: #5D6D7E;
            --shadow: 0 2px 8px rgba(44, 62, 80, 0.10);
            --shadow-lg: 0 6px 24px rgba(44, 62, 80, 0.15);
            --radius: 6px;
            --radius-sm: 3px;
            --transition: 0.18s ease;
            --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            --alkali: #E8A090;
            --alkaline: #F0C080;
            --transition-metal: #F5D98B;
            --post-transition: #C9B89A;
            --metalloid: #A8D8A0;
            --nonmetal: #8CB8D8;
            --halogen: #80C8C0;
            --noble-gas: #C0A8D8;
            --lanthanide: #F0A8B8;
            --actinide: #E898A8;
            --unknown: #C8C8C8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8ECEE;
            font-family: var(--font);
            color: var(--text);
            line-height: 1.55;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            width: 100%;
            max-width: 1300px;
            background: var(--bg);
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 32px);
        }

        /* 头部 */
        .app-header {
            background: var(--dark);
            color: #FFFFFF;
            padding: 18px 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .app-header .logo-icon {
            font-size: 2rem;
            line-height: 1;
        }
        .app-header h1 {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            flex: 1;
            min-width: 200px;
        }
        .app-header .subtitle {
            font-size: 0.8rem;
            opacity: 0.75;
            font-weight: 400;
            letter-spacing: 0.03em;
        }

        /* Tab导航 */
        .tab-nav {
            display: flex;
            background: #FFFFFF;
            border-bottom: 3px solid var(--border);
            overflow-x: auto;
            flex-shrink: 0;
        }
        .tab-nav button {
            flex: 1;
            min-width: 120px;
            padding: 14px 20px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-light);
            transition: var(--transition);
            font-family: var(--font);
            white-space: nowrap;
            position: relative;
            letter-spacing: 0.02em;
        }
        .tab-nav button:hover {
            color: var(--blue);
            background: #F8FAFB;
        }
        .tab-nav button.active {
            color: var(--blue-dark);
            background: #FFFFFF;
        }
        .tab-nav button.active::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--blue);
            border-radius: 3px 3px 0 0;
        }

        /* 内容区 */
        .tab-content {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            background: #FCFDFD;
        }
        .tab-panel {
            display: none;
            animation: fadeIn 0.25s ease;
        }
        .tab-panel.active {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 周期表 */
        .pt-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            align-items: center;
        }
        .pt-search {
            flex: 1;
            min-width: 240px;
            max-width: 420px;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-family: var(--font);
            transition: var(--transition);
            background: #FFFFFF;
        }
        .pt-search:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.10);
        }
        .pt-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 12px;
            font-size: 0.72rem;
            align-items: center;
            color: var(--text-light);
        }
        .pt-legend span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .pt-legend .dot {
            display: inline-block;
            width: 11px;
            height: 11px;
            border-radius: 2px;
            border: 1px solid rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }

        /* 周期表网格 */
        .pt-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 8px;
        }
        .pt-grid {
            display: grid;
            grid-template-columns: repeat(18, 1fr);
            gap: 2px;
            min-width: 900px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .pt-cell {
            aspect-ratio: 1.15 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            font-weight: 600;
            transition: all 0.15s ease;
            position: relative;
            user-select: none;
            border: 1.5px solid transparent;
            background: #FFFFFF;
            min-width: 38px;
            color: var(--text);
            text-align: center;
            padding: 1px 2px;
        }
        .pt-cell:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
            z-index: 10;
            border-color: var(--blue);
            background: #FEFEFE;
        }
        .pt-cell.highlighted {
            animation: pulseHighlight 0.5s ease 2;
            border-color: #E74C3C !important;
            box-shadow: 0 0 0 4px rgba(231, 76, 60, 0.25) !important;
            z-index: 8;
        }
        @keyframes pulseHighlight {
            0%,
            100% {
                box-shadow: 0 0 0 2px rgba(231, 76, 60, 0.3);
            }
            50% {
                box-shadow: 0 0 0 8px rgba(231, 76, 60, 0.55);
            }
        }
        .pt-cell .pt-num {
            font-size: 0.55rem;
            font-weight: 500;
            opacity: 0.7;
            line-height: 1;
            letter-spacing: -0.02em;
        }
        .pt-cell .pt-sym {
            font-size: 0.85rem;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.01em;
        }
        .pt-cell .pt-name {
            font-size: 0.5rem;
            opacity: 0.65;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }
        .pt-cell.empty {
            background: transparent;
            cursor: default;
            border-color: transparent;
            pointer-events: none;
        }
        .pt-cell.placeholder-cell {
            background: #F5F5F5;
            cursor: pointer;
            font-size: 0.55rem;
            color: #888;
            border-style: dashed;
            border-color: #CCC;
            pointer-events: auto;
        }
        .pt-cell.placeholder-cell:hover {
            border-color: var(--blue);
            background: #EEF5FB;
            color: var(--blue-dark);
        }

        /* 分类颜色 */
        .pt-cell.cat-alkali {
            background: #FDE8E4;
            border-color: #E8B8A8;
        }
        .pt-cell.cat-alkaline {
            background: #FDF0DC;
            border-color: #E8C890;
        }
        .pt-cell.cat-transition {
            background: #FEF8E8;
            border-color: #E8D080;
        }
        .pt-cell.cat-post-transition {
            background: #F5EFE5;
            border-color: #D5C8B0;
        }
        .pt-cell.cat-metalloid {
            background: #E8F5E4;
            border-color: #B0D0A0;
        }
        .pt-cell.cat-nonmetal {
            background: #E4EEF6;
            border-color: #A0C0D8;
        }
        .pt-cell.cat-halogen {
            background: #E4F4F2;
            border-color: #98C8C0;
        }
        .pt-cell.cat-noble-gas {
            background: #F0E8F6;
            border-color: #C8B0D8;
        }
        .pt-cell.cat-lanthanide {
            background: #FDE8EE;
            border-color: #E8B0B8;
        }
        .pt-cell.cat-actinide {
            background: #FCE4E8;
            border-color: #E0A0A8;
        }
        .pt-cell.cat-unknown {
            background: #F2F2F2;
            border-color: #D0D0D0;
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 62, 80, 0.55);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeInOverlay 0.2s ease;
        }
        @keyframes fadeInOverlay {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal-card {
            background: #FFFFFF;
            border-radius: 10px;
            padding: 24px 28px;
            max-width: 500px;
            width: 92%;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
            position: relative;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal-close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
            padding: 4px 8px;
            border-radius: 4px;
            transition: var(--transition);
            line-height: 1;
        }
        .modal-close:hover {
            color: #333;
            background: #F0F0F0;
        }
        .modal-card h3 {
            font-size: 1.4rem;
            margin-bottom: 6px;
            color: var(--dark);
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .modal-card .elem-symbol-large {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        .modal-card .elem-number {
            font-size: 0.9rem;
            color: var(--text-light);
            font-weight: 500;
        }
        .modal-card .detail-row {
            display: flex;
            padding: 6px 0;
            border-bottom: 1px solid #F0F0F0;
            font-size: 0.9rem;
            gap: 10px;
        }
        .modal-card .detail-label {
            font-weight: 600;
            min-width: 70px;
            color: var(--dark);
            flex-shrink: 0;
        }
        .modal-card .detail-value {
            color: var(--text-light);
        }
        .modal-card .cat-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #FFF;
            letter-spacing: 0.03em;
        }

        /* 配平器 */
        .balancer-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-width: 750px;
        }
        .balancer-form label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--dark);
            letter-spacing: 0.02em;
        }
        .balancer-form .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .balancer-form input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-family: var(--font);
            background: #FFFFFF;
            transition: var(--transition);
        }
        .balancer-form input[type="text"]:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.10);
        }
        .balancer-form .arrow-symbol {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--dark);
            flex-shrink: 0;
        }
        .condition-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .condition-row select {
            padding: 8px 12px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-family: var(--font);
            font-size: 0.9rem;
            background: #FFFFFF;
            cursor: pointer;
            transition: var(--transition);
        }
        .condition-row select:focus {
            border-color: var(--blue);
            outline: none;
        }
        .condition-row input[type="text"] {
            flex: 1;
            min-width: 140px;
            max-width: 250px;
            padding: 8px 12px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-family: var(--font);
            background: #FFFFFF;
        }
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.03em;
            transition: var(--transition);
            font-family: var(--font);
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--blue);
            color: #FFF;
            box-shadow: 0 2px 6px rgba(52, 152, 219, 0.3);
        }
        .btn-primary:hover {
            background: var(--blue-dark);
            box-shadow: 0 3px 10px rgba(52, 152, 219, 0.4);
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: #FFFFFF;
            color: var(--dark);
            border: 2px solid var(--border);
        }
        .btn-secondary:hover {
            background: #F5F7F8;
            border-color: #BBB;
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 0.78rem;
            border-radius: var(--radius-sm);
        }

        /* 结果显示 */
        .result-box {
            background: #FFFFFF;
            border: 2px solid #D5E8D4;
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-top: 8px;
            border-left: 5px solid #27AE60;
        }
        .result-box .equation-display {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            color: var(--dark);
            word-break: break-all;
        }
        .result-box .equation-display sub {
            font-size: 0.75em;
            color: #E74C3C;
            font-weight: 700;
        }
        .result-box .condition-display {
            font-size: 0.82rem;
            color: #7F8C8D;
            margin-top: 2px;
            font-style: italic;
        }
        .result-box .phenomenon-display {
            margin-top: 8px;
            padding: 10px 14px;
            background: #FFFDF5;
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            color: #5D4E37;
            border-left: 4px solid #F39C12;
            line-height: 1.5;
        }
        .error-box {
            background: #FFF5F5;
            border: 2px solid #F5C6C6;
            border-radius: var(--radius);
            padding: 14px 18px;
            color: #C0392B;
            font-weight: 500;
            border-left: 5px solid #E74C3C;
        }

        /* 反应库 */
        .rxlib-search {
            width: 100%;
            max-width: 500px;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-family: var(--font);
            margin-bottom: 14px;
            background: #FFFFFF;
            transition: var(--transition);
        }
        .rxlib-search:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.10);
        }
        .rxlib-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 520px;
            overflow-y: auto;
        }
        .rxlib-item {
            background: #FFFFFF;
            border: 1.5px solid #E8ECEE;
            border-radius: var(--radius);
            padding: 12px 16px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }
        .rxlib-item:hover {
            border-color: var(--blue);
            box-shadow: var(--shadow);
            background: #FAFCFD;
        }
        .rxlib-item .rx-eq {
            font-weight: 600;
            flex: 1;
            min-width: 200px;
            font-size: 0.9rem;
            letter-spacing: 0.02em;
        }
        .rxlib-item .rx-phenom {
            font-size: 0.78rem;
            color: #7F8C8D;
            flex: 1;
            min-width: 180px;
            font-style: italic;
        }
        .rxlib-item .btn-sm {
            flex-shrink: 0;
        }
        .rxlib-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            background: #E8F0F8;
            color: #2C3E50;
            letter-spacing: 0.03em;
            flex-shrink: 0;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .app-header {
                padding: 12px 16px;
            }
            .app-header h1 {
                font-size: 1.1rem;
            }
            .tab-nav button {
                padding: 10px 12px;
                font-size: 0.8rem;
                min-width: 80px;
            }
            .tab-content {
                padding: 12px;
            }
            .pt-grid {
                min-width: 700px;
                gap: 1px;
            }
            .pt-cell {
                font-size: 0.6rem;
                min-width: 28px;
                aspect-ratio: 1 / 1;
            }
            .pt-cell .pt-sym {
                font-size: 0.68rem;
            }
            .pt-cell .pt-num {
                font-size: 0.45rem;
            }
            .pt-cell .pt-name {
                font-size: 0.4rem;
            }
            .modal-card {
                padding: 16px;
                max-width: 95%;
            }
        }
        @media (max-width: 480px) {
            .pt-grid {
                min-width: 540px;
                gap: 0.5px;
            }
            .pt-cell {
                min-width: 22px;
                font-size: 0.5rem;
                aspect-ratio: 0.9 / 1;
            }
            .pt-cell .pt-sym {
                font-size: 0.55rem;
            }
            .pt-cell .pt-num {
                font-size: 0.38rem;
            }
            .pt-cell .pt-name {
                display: none;
            }
            .balancer-form .input-row {
                flex-direction: column;
                align-items: stretch;
            }
            .balancer-form .arrow-symbol {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 头部 -->
        <header class="app-header">
            <span class="logo-icon">⚗️</span>
            <div>
                <h1>化学方程式配平与元素周期表工具箱</h1>
                <span class="subtitle">Chemistry Balancer &amp; Periodic Table Toolkit</span>
            </div>
        </header>

        <!-- Tab导航 -->
        <nav class="tab-nav" role="tablist">
            <button class="tab-btn active" data-tab="tab-periodic" role="tab" aria-selected="true">🔬 元素周期表</button>
            <button class="tab-btn" data-tab="tab-balancer" role="tab" aria-selected="false">⚖️ 方程式配平器</button>
            <button class="tab-btn" data-tab="tab-library" role="tab" aria-selected="false">📚 常见反应库</button>
        </nav>

        <!-- 内容区 -->
        <main class="tab-content">
            <!-- Tab1: 元素周期表 -->
            <section class="tab-panel active" id="tab-periodic">
                <div class="pt-controls">
                    <input type="text" class="pt-search" id="ptSearch" placeholder="🔍 搜索元素（符号或名称，如 Fe / 铁 / Iron）">
                    <div class="pt-legend">
                        <span><span class="dot" style="background:#FDE8E4;border-color:#E8B8A8;"></span> 碱金属</span>
                        <span><span class="dot" style="background:#FDF0DC;border-color:#E8C890;"></span> 碱土金属</span>
                        <span><span class="dot" style="background:#FEF8E8;border-color:#E8D080;"></span> 过渡金属</span>
                        <span><span class="dot" style="background:#E4EEF6;border-color:#A0C0D8;"></span> 非金属</span>
                        <span><span class="dot" style="background:#E4F4F2;border-color:#98C8C0;"></span> 卤素</span>
                        <span><span class="dot" style="background:#F0E8F6;border-color:#C8B0D8;"></span> 稀有气体</span>
                    </div>

            // ==================== 化学式解析器 ====================
            function parseFormula(formula) {
                // 解析化学式如 "Fe2(SO4)3" -> {Fe:2, S:3, O:12}
                const result = {};
                let i = 0;
                const s = formula.trim();
                if (!s) return result;

                function parseGroup(multiplier) {
                    while (i < s.length) {
                        if (s[i] === '(') {
                            i++; // 跳过'('
                            const subResult = {};
                            while (i < s.length && s[i] !== ')') {
                                const elem = parseElement();
                                if (!elem) break;
                                const count = parseNumber();
                                subResult[elem] = (subResult[elem] || 0) + count;
                            }
                            if (i < s.length) i++; // 跳过')'
                            const groupCount = parseNumber();
                            const m = multiplier * groupCount;
                            for (const [el, c] of Object.entries(subResult)) {
                                result[el] = (result[el] || 0) + c * m;
                            }
                        } else if (s[i] === ')') {
                            break;
                        } else if (/[A-Z]/.test(s[i])) {
                            const elem = parseElement();
                            if (!elem) break;
                            const count = parseNumber();
                            result[elem] = (result[elem] || 0) + count * multiplier;
                        } else {
                            i++;
                        }
                    }
                }

                function parseElement() {
                    if (i >= s.length || !/[A-Z]/.test(s[i])) return null;
                    let elem = s[i];
                    i++;
                    while (i < s.length && /[a-z]/.test(s[i])) {
                        elem += s[i];
                        i++;
                    }
                    return elem;
                }

                function parseNumber() {
                    let numStr = '';
                    while (i < s.length && /[0-9]/.test(s[i])) {
                        numStr += s[i];
                        i++;
                    }
                    return numStr ? parseInt(numStr, 10) : 1;
                }
                parseGroup(1);
                return result;
            }

            // ==================== 配平算法（高斯消元矩阵法） ====================
            function balanceEquation(reactantsList, productsList) {
                // reactantsList: ["Mg", "O2"], productsList: ["MgO"]
                const allSubstances = [...reactantsList, ...productsList];
                const nSubstances = allSubstances.length;
                const parsedFormulas = allSubstances.map(f => parseFormula(f));

                // 收集所有元素
                const allElementsSet = new Set();
                parsedFormulas.forEach(pf => Object.keys(pf).forEach(el => allElementsSet.add(el)));
                const allElements = Array.from(allElementsSet);
                const nElements = allElements.length;

                if (nElements === 0) return null;
                if (nSubstances < 2) return null;

                // 构建矩阵：nElements行 × nSubstances列
                // 对于反应物系数为正，生成物系数为负（在零空间中）
                // 实际我们想要 sum(coeff * count) for reactants = sum(coeff * count) for products
                // 即 sum(coeff * count) for reactants - sum(coeff * count) for products = 0
                const matrix = [];
                for (let e = 0; e < nElements; e++) {
                    const row = [];
                    for (let s = 0; s < nSubstances; s++) {
                        const count = parsedFormulas[s][allElements[e]] || 0;
                        if (s < reactantsList.length) {
                            row.push(count); // 反应物为正
                        } else {
                            row.push(-count); // 生成物为负
                        }
                    }
                    matrix.push(row);
                }

                // 高斯消元求零空间
                // 将矩阵化为行阶梯形
                const m = nElements;
                const n = nSubstances;
                const aug = matrix.map(r => [...r]); // 深拷贝
                let pivotRow = 0;
                const pivotCols = [];

                for (let col = 0; col < n && pivotRow < m; col++) {
                    // 找主元
                    let bestRow = -1;
                    let bestVal = 0;
                    for (let r = pivotRow; r < m; r++) {
                        if (Math.abs(aug[r][col]) > Math.abs(bestVal)) {
                            bestVal = Math.abs(aug[r][col]);
                            bestRow = r;
                        }
                    }
                    if (bestVal < 1e-9) continue;
                    // 交换行
                    [aug[pivotRow], aug[bestRow]] = [aug[bestRow], aug[pivotRow]];
                    const pivot = aug[pivotRow][col];
                    // 归一化
                    for (let c = col; c < n; c++) {
                        aug[pivotRow][c] /= pivot;
                    }
                    // 消去其他行
                    for (let r = 0; r < m; r++) {
                        if (r === pivotRow) continue;
                        const factor = aug[r][col];
                        if (Math.abs(factor) < 1e-12) continue;
                        for (let c = col; c < n; c++) {
                            aug[r][c] -= factor * aug[pivotRow][c];
                        }
                    }
                    pivotCols.push(col);
                    pivotRow++;
                }

                // 找到零空间向量
                // 自由变量数量 = n - rank
                const rank = pivotCols.length;
                const freeCount = n - rank;
                if (freeCount <= 0) {
                    // 尝试所有系数为1的情况
                    return fallbackBalance(parsedFormulas, reactantsList.length, allElements);
                }

                // 为每个自由变量赋值，求解零空间基向量
                // 对于化学配平，通常自由变量为1（只有一个自由度）
                // 我们取自由变量的一个整数基向量
                const freeCols = [];
                for (let c = 0; c < n; c++) {
                    if (!pivotCols.includes(c)) freeCols.push(c);
                }

                // 构建零空间向量：为每个自由变量依次设为1，其他自由变量为0，回代求解
                const nullspaceVectors = [];
                for (const freeCol of freeCols) {
                    const solution = new Array(n).fill(0);
                    solution[freeCol] = 1;
                    // 回代
                    for (let pi = rank - 1; pi >= 0; pi--) {
                        const pCol = pivotCols[pi];
                        let sum = 0;
                        for (let c = pCol + 1; c < n; c++) {
                            sum += aug[pi][c] * solution[c];
                        }
                        solution[pCol] = -sum;
                    }
                    nullspaceVectors.push(solution);
                }

                // 如果只有一个零空间向量，直接用它
                let finalSolution;
                if (nullspaceVectors.length === 1) {
                    finalSolution = nullspaceVectors[0];
                } else {
                    // 多个自由变量，尝试找到最小整数组合
                    // 取第一个向量（最常见情况）
                    finalSolution = nullspaceVectors[0];
                }

                // 转换为最小整数比
                const scaled = rationalToInteger(finalSolution);
                if (!scaled) return fallbackBalance(parsedFormulas, reactantsList.length, allElements);

                // 确保所有系数为正
                const allPositive = scaled.map(x => Math.abs(Math.round(x)));
                // 检查是否合理（所有系数>0）
                if (allPositive.some(x => x === 0)) {
                    return fallbackBalance(parsedFormulas, reactantsList.length, allElements);
                }

                // 除以最大公约数
                const gcd = findGCD(allPositive);
                const simplest = allPositive.map(x => x / gcd);

                return {
                    coefficients: simplest,
                    reactants: reactantsList,
                    products: productsList,
                    allElements: allElements,
                };
            }

            function fallbackBalance(parsedFormulas, nReactants, allElements) {
                // 回退方法：尝试迭代法
                // 对于简单反应（2-3个反应物，1-2个生成物），使用暴力搜索小系数
                const nTotal = parsedFormulas.length;
                const maxCoeff = 15;
                // 只对小规模反应尝试
                if (nTotal > 5) return null;

                // 尝试所有可能的系数组合（非常简单的暴力搜索）
                function tryCoeffs(coeffs) {
                    const totals = {};
                    for (const el of allElements) totals[el] = 0;
                    for (let i = 0; i < nTotal; i++) {
                        const pf = parsedFormulas[i];
                        const sign = i < nReactants ? 1 : -1;
                        for (const [el, count] of Object.entries(pf)) {
                            totals[el] = (totals[el] || 0) + sign * coeffs[i] * count;
                        }
                    }
                    return Object.values(totals).every(v => Math.abs(v) < 1e-9);
                }

                // 递归搜索（仅适用于小规模）
                function search(depth, coeffs) {
                    if (depth === nTotal) {
                        if (coeffs.some(c => c === 0)) return null;
                        if (tryCoeffs(coeffs)) return [...coeffs];
                        return null;
                    }
                    for (let c = 1; c <= maxCoeff; c++) {
                        coeffs.push(c);
                        const result = search(depth + 1, coeffs);
                        if (result) return result;
                        coeffs.pop();
                    }
                    return null;
                }
                const result = search(0, []);
                if (result) {
                    const gcd = findGCD(result);
                    return {
                        coefficients: result.map(x => x / gcd),
                        reactants: [],
                        products: [],
                        allElements: allElements,
                    };
                }
                return null;
            }

            function rationalToInteger(vec) {
                // 将可能有小数的向量转换为整数向量
                // 找到所有非零值的最小公倍数
                const nonZero = vec.filter(x => Math.abs(x) > 1e-10);
                if (nonZero.length === 0) return null;
                // 使用连分数近似或直接缩放
                // 简化：找到最大分母
                let maxDenom = 1;
                for (const v of vec) {
                    if (Math.abs(v) < 1e-10) continue;
                    const frac = toFraction(Math.abs(v), 1000);
                    maxDenom = lcm(maxDenom, frac[1]);
                }
                const result = vec.map(v => Math.round(v * maxDenom));
                return result;
            }

            function toFraction(value, maxDenom) {
                // 将浮点数近似为分数 [numerator, denominator]
                if (Math.abs(value - Math.round(value)) < 1e-9) return [Math.round(value), 1];
                let bestNum = 0,
                    bestDen = 1,
                    bestErr = Infinity;
                for (let den = 1; den <= maxDenom; den++) {
                    const num = Math.round(value * den);
                    const err = Math.abs(value - num / den);
                    if (err < bestErr) {
                        bestErr = err;
                        bestNum = num;
                        bestDen = den;
                        if (err < 1e-10) break;
                    }
                }
                return [bestNum, bestDen];
            }

            function findGCD(arr) {
                let g = arr[0];
                for (let i = 1; i < arr.length; i++) {
                    g = gcd2(g, arr[i]);
                    if (g === 1) break;
                }
                return g;
            }

            function gcd2(a, b) {
                a = Math.abs(a);
                b = Math.abs(b);
                while (b) { [a, b] = [b, a % b]; }
                return a || 1;
            }

            function lcm(a, b) {
                return (a * b) / gcd2(a, b);
            }

            // ==================== 配平器UI ====================
            const reactantsInput = document.getElementById('reactantsInput');
            const productsInput = document.getElementById('productsInput');
            const conditionPreset = document.getElementById('conditionPreset');

                if (!reactantsRaw || !productsRaw) {

                if (reactantsList.length === 0 || productsList.length === 0) {

                // 验证化学式
                const allSubstances = [...reactantsList, ...productsList];
                let parseError = false;
                const parsedAll = [];
                for (const subst of allSubstances) {

                    }
                    // 验证元素是否在周期表中
                    for (const el of Object.keys(pf)) {
                        if (!elemBySymbol.has(el.toLowerCase())) {

                                `<div class="error-box">⚠️ 未知元素符号：<strong>${el}</strong>（在化学式 ${subst} 中）</div>`;
                            parseError = true;
                            break;
                        }
                    }
                    if (parseError) break;
                    parsedAll.push(pf);
                }
                if (parseError) return;

                const result = balanceEquation(reactantsList, productsList);
                if (!result || !result.coefficients || result.coefficients.some(c => c <= 0 || isNaN(c))) {
                    balanceResult.innerHTML =
                        '<div class="error-box">❌ 无法配平该方程式，请检查反应物和生成物是否正确。<br>提示：确保方程式在化学上是合理的。</div>';
                    return;
                }

                const coeffs = result.coefficients;

                const arrowHTML = conditionText ?

                    '→';

                let html = '<div class="result-box">';
                html +=
                    `<div class="equation-display">${reactantParts} ${arrowHTML} ${productParts}</div>`;
                if (conditionText) {
                    html +=
                        `<div class="condition-display">📌 反应条件：${conditionText}</div>`;
                }
                // 检查反应库中是否有匹配的现象
                const phenom = findPhenomenon(reactantsList, productsList);

            // 标准化反应库数据用于匹配
            const reactionLibParsed = reactionLibrary.map(rx => {
                const reactants = rx[0];
                const products = rx[2];
                const condition = rx[3];
                const phenomenon = rx[4];
                const tag = rx[5];
                // 为配平器准备原始字符串
                const reactantsStr = reactants.join(' + ');
                const productsStr = products.join(' + ');
                return {
                    reactants,
                    products,
                    reactantsStr,
                    productsStr,
                    condition,
                    phenomenon,
                    tag,
                    searchText: (reactantsStr + ' ' + productsStr + ' ' + condition + ' ' + phenomenon + ' ' +
                        tag).toLowerCase(),
                };
            });

            function findPhenomenon(reactantsList, productsList) {
                // 精确匹配或模糊匹配
                const rSet = new Set(reactantsList.map(s => s.toLowerCase()));
                const pSet = new Set(productsList.map(s => s.toLowerCase()));
                for (const rx of reactionLibParsed) {
                    const rxRSet = new Set(rx.reactants.map(s => s.toLowerCase()));
                    const rxPSet = new Set(rx.products.map(s => s.toLowerCase()));
                    if (setsEqual(rSet, rxRSet) && setsEqual(pSet, rxPSet)) {
                        return rx.phenomenon;
                    }
                }
                return null;
            }

            function setsEqual(a, b) {
                if (a.size !== b.size) return false;
                for (const item of a) {
                    if (!b.has(item)) return false;
                }
                return true;
            }

            // ==================== 反应库UI ====================
            const rxlibList = document.getElementById('rxlibList');
            const rxlibSearch = document.getElementById('rxlibSearch');

            function renderReactionLibrary(filter = '') {
                rxlibList.innerHTML = '';
                const filtered = reactionLibParsed.filter(rx =>
                    !filter || rx.searchText.includes(filter.toLowerCase())
                );
                if (filtered.length === 0) {
                    rxlibList.innerHTML =
                        '<p style="text-align:center;color:#999;padding:30px;">未找到匹配的反应，请尝试其他关键词</p>';
                    return;
                }
                filtered.forEach((rx, idx) => {
                    const item = document.createElement('div');
                    item.classList.add('rxlib-item');
                    item.innerHTML = `
                        <span class="rxlib-badge">${rx.tag}</span>
                        <span class="rx-eq">${rx.reactantsStr} → ${rx.productsStr}</span>
                        ${rx.condition ? `<span style="font-size:0.75rem;color:#E74C3C;">【${rx.condition}】</span>` : ''}
                        <span class="rx-phenom">🔬 ${rx.phenomenon}</span>
                        <button class="btn btn-sm btn-primary load-rx-btn">载入配平器</button>
                    `;
                    item.querySelector('.load-rx-btn').addEventListener('click', () => {
                        // 切换到配平器tab
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove(
                            'active'));
                        document.querySelector('[data-tab="tab-balancer"]').classList.add('active');
                        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove(
                            'active'));
                        document.getElementById('tab-balancer').classList.add('active');
                        // 填充数据
                        reactantsInput.value = rx.reactantsStr;
                        productsInput.value = rx.productsStr;
                        conditionPreset.value = rx.condition || '';
                        conditionCustom.value = '';
                        balanceResult.innerHTML = '';
                        // 滚动到配平器
                        document.getElementById('tab-balancer').scrollIntoView({ behavior: 'smooth' });
                    });
                    rxlibList.appendChild(item);
                });
            }

            rxlibSearch.addEventListener('input', () => {
                renderReactionLibrary(rxlibSearch.value.trim());
            });

            // ==================== Tab切换 ====================
            const tabButtons = document.querySelectorAll('.tab-btn');
            const tabPanels = document.querySelectorAll('.tab-panel');
            tabButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const targetId = btn.dataset.tab;
                    tabButtons.forEach(b => { b.classList.remove('active');
                        b.setAttribute('aria-selected', 'false'); });
                    btn.classList.add('active');
                    btn.setAttribute('aria-selected', 'true');
                    tabPanels.forEach(p => p.classList.remove('active'));
                    const targetPanel = document.getElementById(targetId);
                    if (targetPanel) targetPanel.classList.add('active');
                });
            });

            // ==================== 初始化 ====================
            function init() {
                renderPeriodicTable();
                renderReactionLibrary();
            }
